version: "3.9"
services:
  app:
    build:
      context: ../
      dockerfile: ./SomeShop.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Tests
      - ASPNETCORE_URLS=http://+:13001
    ports:
      - "13001:13001"
    depends_on:
      - db
      - init-kafka
      - kafka
    
  tests:
    build:
      context: ../
      dockerfile: ./SomeShop.IntegrationTests/Dockerfile
    environment:
      - SOMESHOP_API_URL=http://app:13001
    depends_on:
      - app
      - db
      - init-kafka
      - kafka
